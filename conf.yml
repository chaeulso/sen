info:
  name: "Astro Theme"
  identifier: "astrotheme"
  description: "A modern glassmorphism dashboard theme for Pterodactyl Panel. Features glass effects, smooth animations, full color customization, SVG backgrounds, live preview, and responsive design."
  flags: ""
  version: "1.0.0"
  target: "beta-2026-06"
  author: "Astro Theme Contributors"
  icon: "public/images/icon.svg"
  website: "https://github.com/chaeulso/sen"

admin:
